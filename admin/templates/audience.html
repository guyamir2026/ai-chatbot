{% extends "base.html" %}

{% block content %}
<div class="page-header">
    <h1><i class="bi bi-person-lock"></i> ניהול קהל</h1>
    <p class="text-muted">חסימת משתמשים מטרידים ושחרור חסימות</p>
</div>

<!-- חיפוש משתמשים -->
<div class="card mb-4">
    <div class="card-header">
        <h2 class="card-title"><i class="bi bi-search"></i> חיפוש משתמשים</h2>
    </div>
    <div class="card-body">
        <input type="text" class="form-control" name="q"
               placeholder="הקלד שם משתמש או מזהה..."
               hx-get="/audience/search"
               hx-trigger="keyup changed delay:300ms"
               hx-target="#search-results"
               autocomplete="off">
        <div id="search-results" style="margin-top:0.5rem;"></div>
    </div>
</div>

<!-- רשימת חסומים -->
<div class="card">
    <div class="card-header">
        <h2 class="card-title"><i class="bi bi-person-x"></i> משתמשים חסומים</h2>
    </div>
    <div class="card-body">
        {% include "partials/blocked_list.html" %}
    </div>
</div>
{% endblock %}
