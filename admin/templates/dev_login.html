<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>איזור מפתח — התחברות</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Rubik:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet" crossorigin="anonymous">
    <link href="{{ url_for('static', filename='css/style.css') }}" rel="stylesheet">
</head>
<body class="login-page">
    <div class="login-card">
        <div class="login-icon">
            <i class="bi bi-shield-lock"></i>
        </div>
        <h2 class="login-title">איזור מפתח</h2>
        <p class="login-subtitle">ניהול חבילות ופיצ'רים</p>

        {% with messages = get_flashed_messages(with_categories=true) %}
        {% if messages %}
        {% for category, message in messages %}
        <div class="alert alert-{{ category }}" style="margin-bottom: 1rem;">
            <span>{{ message }}</span>
        </div>
        {% endfor %}
        {% endif %}
        {% endwith %}

        <form method="POST">
            <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
            <div class="form-group">
                <label for="password" class="form-label">סיסמת מפתח</label>
                <input type="password" class="form-input" id="password" name="password"
                       required autofocus
                       autocomplete="current-password"
                       placeholder="הזינו את ה-DEVELOPER_PASSWORD">
            </div>
            <button type="submit" class="btn btn-primary btn-block">
                <i class="bi bi-box-arrow-in-left"></i> התחבר
            </button>
        </form>

        <p class="login-footer" style="margin-top: 1.5rem; font-size: 0.85rem; opacity: 0.7;">
            איזור זה מנוהל ע"י ספק ה-SaaS בלבד. בעלי עסק — אנא חזרו ל
            <a href="{{ url_for('login') }}">פאנל הניהול הרגיל</a>.
        </p>
    </div>
</body>
</html>
